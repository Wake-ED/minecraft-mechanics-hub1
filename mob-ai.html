<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minecraft Mechanics Hub – Mob AI</title>
  <link rel="stylesheet" href="style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      font-family: 'Press Start 2P', cursive;
      background: url('https://i.imgur.com/8fKQZ0R.png'); /* grass block texture */
      background-size: 64px 64px;
      color: #fff;
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }
    header {
      background: url('https://i.imgur.com/8fKQZ0R.png');
      background-size: cover;
      padding: 30px;
      text-align: center;
      font-size: 1.8em;
      border-bottom: 8px solid #3a9d23;
      text-shadow: 2px 2px #000;
    }
    nav {
      background-color: #2e2e2e;
      padding: 15px;
      display: flex;
      justify-content: center;
      gap: 30px;
      border-bottom: 4px solid #3a9d23;
    }
    nav a {
      color: #3a9d23;
      text-decoration: none;
      padding: 5px 10px;
      border: 2px solid #3a9d23;
      background-color: #111;
    }
    nav a:hover {
      background-color: #3a9d23;
      color: #111;
    }
    .content {
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }
    .article-list {
      background-color: rgba(34,34,34,0.9);
      padding: 20px;
      border: 4px solid #3a9d23;
      box-shadow: 4px 4px #000;
    }
    .article-list h2 {
      margin-top: 0;
      color: #3a9d23;
      text-shadow: 2px 2px #000;
    }
    .article-list ul {
      list-style: square;
      padding-left: 20px;
    }
    .article-list a {
      color: #3a9d23;
      text-decoration: none;
    }
    .article-list a:hover {
      text-decoration: underline;
      color: #fff;
    }
    footer {
      text-align: center;
      padding: 15px;
      background-color: #111;
      border-top: 4px solid #3a9d23;
      color: #3a9d23;
      font-size: 0.9em;
    }
  </style>

</head>
<body>
  <header>
    <h1>Minecraft Mechanics Hub</h1>
  </header>

  <main>
    <h2>Mob AI</h2>
    <p>Welcome to the Mob AI page. This section will evolve into an interactive space where you can explore Minecraft mechanics in depth.</p>

    <!-- Chat UI placeholder -->
    <div id="chatWindow">
      <p style="color:#888;">Chat interface coming soon...</p>
    </div>
  </main>

  <footer>
    Minecraft Mechanics Hub – Version 1.1.0 <br>
    <a href="README.md" target="_blank">View Project README</a>
  </footer>
</body>
</html>
