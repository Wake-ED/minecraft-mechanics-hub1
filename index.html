<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minecraft Mechanics Hub – Mob AI</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #1e1e1e;
      color: #d4d4d4;
      font-family: 'Press Start 2P', monospace;
      margin: 0;
      padding: 0;
    }

    header {
      text-align: center;
      padding: 20px;
      border-bottom: 4px solid #00ff00;
    }

    h1 {
      margin: 0;
      color: #00ff00;
    }

    main {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background-color: #2b2b2b;
      border: 2px solid #00ff00;
      border-radius: 8px;
    }

    h2 {
      color: #00ff00;
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 20px;
      line-height: 1.5;
    }

    #chatWindow {
      background-color: #111;
      border: 2px solid #00ff00;
      padding: 20px;
      border-radius: 8px;
      min-height: 200px;
    }

    footer {
      text-align: center;
      padding: 15px;
      border-top: 4px solid #00ff00;
      margin-top: 40px;
      font-size: 12px;
    }

    footer a {
      color: #00ff00;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>Minecraft Mechanics Hub</h1>
  </header>

  <main>
    <h2>Mob AI</h2>
    <p>Welcome to the Mob AI page. This section will evolve into an interactive space where you can explore Minecraft mechanics in depth.</p>

    <!-- Chat UI placeholder -->
    <div id="chatWindow">
      <p style="color:#888;">Chat interface coming soon...</p>
    </div>
  </main>

  <footer>
    Minecraft Mechanics Hub – Version 1.1.0 <br>
    <a href="README.md" target="_blank">View Project README</a>
  </footer>
</body>
</html>
